version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api1
      - api2
    networks:
      - internal

  api1:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./api1:/app
    command: >
      sh -c "pip install flask && python appi.py"
    networks:
      - internal

  api2:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./api2:/app
    command: >
      python serv.py
    networks:
      - internal

networks:
  internal:
    driver: bridge
